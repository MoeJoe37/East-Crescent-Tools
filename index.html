<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المردود</title>
    <!-- Tailwind CSS for a professional, modern look -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Arabic Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f172a; /* Deep slate background */
            color: #f1f5f9;
        }
        .app-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Custom styles for inputs to ensure a clean look */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg app-container rounded-3xl shadow-2xl overflow-hidden animate-in fade-in duration-700">
        <!-- Header Section -->
        <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 text-center">
            <h1 class="text-3xl font-extrabold text-white">حاسبة المردود</h1>
            <p class="text-indigo-100 text-sm mt-2 opacity-80">نظام إدارة المرتجعات والهدايا</p>
        </div>

        <div class="p-8 space-y-6">
            <!-- User Inputs -->
            <div class="grid grid-cols-1 gap-5">
                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2 mr-1">عدد القطع المدفوعة</label>
                    <input type="number" id="paidInput" placeholder="أدخل العدد هنا..." 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                </div>
                
                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2 mr-1">عدد الهدايا (مجانية)</label>
                    <input type="number" id="giftInput" placeholder="أدخل العدد هنا..." 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                </div>

                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2 mr-1">كمية المردود (المرتجع)</label>
                    <input type="number" id="returnQtyInput" placeholder="أدخل الكمية المرتجعة..." 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all ring-1 ring-slate-800">
                </div>

                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2 mr-1">سعر المنتج (للكارتونة)</label>
                    <input type="number" step="any" id="priceInput" placeholder="أدخل السعر..." 
                           class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all font-mono">
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 pt-4">
                <button onclick="calculate()" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all transform active:scale-95 shadow-lg shadow-indigo-500/20">
                    احسب الآن
                </button>
                <button onclick="clearAll()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-4 rounded-xl transition-all active:scale-95">
                    مسح
                </button>
            </div>

            <!-- Results Card -->
            <div id="resultsArea" class="bg-black/30 rounded-2xl p-6 border border-slate-700/50 space-y-4">
                <h3 class="text-sm font-bold text-slate-400 border-b border-slate-700/50 pb-2 flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span>
                    النتائج التفصيلية
                </h3>
                
                <div class="flex justify-between items-center group">
                    <span class="text-slate-400 group-hover:text-slate-300 transition-colors">سعر المنتج الفعلي:</span>
                    <span id="piecePriceLbl" class="text-xl font-mono text-white">-</span>
                </div>
                <div class="flex justify-between items-center group">
                    <span class="text-slate-400 group-hover:text-slate-300 transition-colors">القطع المدفوعة في المردود:</span>
                    <span id="paidInReturnLbl" class="text-xl font-mono text-emerald-400 font-bold">-</span>
                </div>
                <div class="flex justify-between items-center group">
                    <span class="text-slate-400 group-hover:text-slate-300 transition-colors">القطع المجانية في المردود:</span>
                    <span id="freeInReturnLbl" class="text-xl font-mono text-amber-500 font-bold">-</span>
                </div>
                <div class="flex justify-between items-center pt-2 border-t border-slate-700/50">
                    <span class="text-slate-300 font-bold">إجمالي المردود:</span>
                    <span id="returnTotalLbl" class="text-xl font-mono text-indigo-400 font-extrabold">-</span>
                </div>
            </div>

            <div id="statusMsg" class="h-4 text-center text-xs font-medium opacity-0 transition-opacity"></div>
        </div>
    </div>

    <!-- Modern Error Modal -->
    <div id="errorModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center p-6 z-50">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-xs w-full text-center shadow-2xl">
            <div class="text-rose-500 text-5xl mb-4">⚠️</div>
            <h4 class="text-xl font-bold text-white mb-2">تنبيه</h4>
            <p id="errorText" class="text-slate-400 text-sm mb-8 leading-relaxed"></p>
            <button onclick="hideError()" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors">فهمت</button>
        </div>
    </div>

    <script>
        function showError(msg) {
            document.getElementById('errorText').innerText = msg;
            document.getElementById('errorModal').style.display = 'flex';
        }

        function hideError() {
            document.getElementById('errorModal').style.display = 'none';
        }

        function showStatus(msg, isError = false) {
            const status = document.getElementById('statusMsg');
            status.innerText = msg;
            status.className = `text-center text-xs font-medium transition-opacity duration-300 ${isError ? 'text-rose-400' : 'text-emerald-400'}`;
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 3000);
        }

        function calculate() {
            const pVal = document.getElementById('paidInput').value;
            const gVal = document.getElementById('giftInput').value;
            const rVal = document.getElementById('returnQtyInput').value;
            const prVal = document.getElementById('priceInput').value;

            if (!pVal || !gVal || !rVal || !prVal) {
                showError("الرجاء إدخال كافة البيانات المطلوبة لإتمام عملية الحساب.");
                return;
            }

            const paid = parseFloat(pVal);
            const gifts = parseFloat(gVal);
            const returnedQty = parseFloat(rVal);
            const price = parseFloat(prVal);

            if (paid < 0 || gifts < 0 || returnedQty < 0 || price <= 0) {
                showError("تأكد من إدخال قيم موجبة، وسعر أكبر من الصفر.");
                return;
            }

            const totalUnits = paid + gifts;
            if (totalUnits === 0) {
                showError("لا يمكن إجراء الحساب عندما يكون مجموع القطع والهدايا صفراً.");
                return;
            }

            // High Precision Calculation Logic
            // Step 1: Effective Price per piece including free gifts
            const piecePrice = (paid * price) / totalUnits;
            
            // Step 2: Calculate how much of the returned quantity was "paid for"
            const paidInReturnRaw = (piecePrice * returnedQty) / price;
            
            // Step 3: Rounding logic (equivalent to ROUND_HALF_UP)
            let paidInReturn = Math.round(paidInReturnRaw);

            // Bounds checking
            if (paidInReturn > returnedQty) paidInReturn = returnedQty;
            if (paidInReturn < 0) paidInReturn = 0;

            const freeInReturn = returnedQty - paidInReturn;

            // Formatting price to display clean numbers
            const formattedPrice = Number(piecePrice.toFixed(4)).toString();

            // Display
            document.getElementById('piecePriceLbl').innerText = formattedPrice;
            document.getElementById('paidInReturnLbl').innerText = paidInReturn;
            document.getElementById('freeInReturnLbl').innerText = freeInReturn;
            document.getElementById('returnTotalLbl').innerText = returnedQty;

            showStatus("تمت العملية بنجاح");
        }

        function clearAll() {
            ['paidInput', 'giftInput', 'returnQtyInput', 'priceInput'].forEach(id => {
                document.getElementById(id).value = '';
            });
            
            document.getElementById('piecePriceLbl').innerText = '-';
            document.getElementById('paidInReturnLbl').innerText = '-';
            document.getElementById('freeInReturnLbl').innerText = '-';
            document.getElementById('returnTotalLbl').innerText = '-';
            
            showStatus("تمت إعادة التعيين");
        }
    </script>
</body>
</html>
