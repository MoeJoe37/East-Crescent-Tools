<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Crescent Tools - هلال الشرق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            transition: all 0.3s ease;
        }
        .app-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .cake-input {
            background-color: #ffffff !important;
            color: #000000 !important;
        }
        .nav-btn.active {
            background-color: #4f46e5;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Header / Branding & Language Toggle -->
    <div class="w-full max-w-lg flex justify-between items-start mt-6 mb-8">
        <div class="text-right flex-1" id="header-text">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500" data-en="East Crescent Tools" data-ar="هلال الشرق">هلال الشرق</h1>
            <p class="text-slate-400 mt-2" data-en="Management & Operations Tools" data-ar="أدوات الإدارة والعمليات">أدوات الإدارة والعمليات</p>
        </div>
        <button onclick="toggleLanguage()" class="bg-slate-800 hover:bg-slate-700 text-xs font-bold py-2 px-4 rounded-full border border-slate-600 transition-colors ml-4" id="lang-toggle">
            English
        </button>
    </div>

    <!-- Navigation Bar -->
    <div class="w-full max-w-lg flex gap-2 mb-6 bg-slate-800/50 p-1.5 rounded-2xl border border-slate-700">
        <button onclick="switchTab('cakeTab')" id="btn-cakeTab" class="nav-btn active flex-1 py-3 rounded-xl font-bold transition-all text-sm" data-en="Cake Converter" data-ar="حاسبة الكيك">حاسبة الكيك</button>
        <button onclick="switchTab('returnTab')" id="btn-returnTab" class="nav-btn flex-1 py-3 rounded-xl font-bold transition-all text-sm text-slate-400 hover:text-white" data-en="Return Calculator" data-ar="حاسبة المردود">حاسبة المردود</button>
    </div>

    <!-- 1. Cake Converter Tool -->
    <div id="cakeTab" class="tool-tab w-full max-w-lg app-container rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 text-center">
            <h2 class="text-3xl font-extrabold text-white" data-en="Cake Converter" data-ar="حاسبة الكيك">حاسبة الكيك</h2>
            <p class="text-blue-100 text-sm mt-2 opacity-80" data-en="Convert distribution to units" data-ar="تحويل التوزيع إلى وحدات">تحويل التوزيع إلى وحدات</p>
        </div>
        <div class="p-8 space-y-6">
            
            <!-- Three Entry Fields (New Input Method) -->
            <div class="grid grid-cols-3 gap-3">
                <div>
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2" data-en="Packages" data-ar="بالة">بالة</label>
                    <input type="number" id="inputPkg" placeholder="0" class="cake-input w-full p-4 rounded-xl border-none text-lg font-bold outline-none focus:ring-4 focus:ring-blue-500/30 text-center">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2" data-en="Boxes" data-ar="كرتونة">كرتونة</label>
                    <input type="number" id="inputBox" placeholder="0" class="cake-input w-full p-4 rounded-xl border-none text-lg font-bold outline-none focus:ring-4 focus:ring-blue-500/30 text-center">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-blue-400 uppercase mb-2" data-en="Pieces" data-ar="قطعة">قطعة</label>
                    <input type="number" id="inputPcs" placeholder="0" class="cake-input w-full p-4 rounded-xl border-none text-lg font-bold outline-none focus:ring-4 focus:ring-blue-500/30 text-center">
                </div>
            </div>

            <button onclick="calculateCake()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20" data-en="Calculate Total" data-ar="احسب الإجمالي">احسب الإجمالي</button>
            
            <!-- Result Display (Old Output Method) -->
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1" data-en="Decimal Value" data-ar="القيمة العشرية">القيمة العشرية</p>
                    <p id="cakeDecimalVal" class="text-2xl font-mono font-bold text-white">0</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1" data-en="Total Pieces" data-ar="إجمالي القطع">إجمالي القطع</p>
                    <p id="cakeTotalPcs" class="text-2xl font-mono font-bold text-blue-400">0</p>
                </div>
            </div>

            <div id="cakeDetailedResult" class="bg-indigo-900/40 p-6 rounded-2xl border border-indigo-500/30 text-center">
                <p class="text-[10px] text-indigo-300 font-bold uppercase tracking-widest mb-2" data-en="Package Breakdown" data-ar="تفصيل الطربالة">تفصيل الطرالبالة</p>
                <p id="cakeFormatVal" class="text-2xl font-bold text-white">-</p>
            </div>

            <button onclick="clearCake()" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-400 font-bold py-2 rounded-lg text-xs transition-all" data-en="Clear All" data-ar="مسح البيانات">مسح البيانات</button>
        </div>
    </div>

    <!-- 2. Products Return Calculator Tool -->
    <div id="returnTab" class="tool-tab w-full max-w-lg app-container rounded-3xl shadow-2xl overflow-hidden hidden">
        <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 text-center">
            <h2 class="text-3xl font-extrabold text-white" data-en="Return Calculator" data-ar="حاسبة المردود">حاسبة المردود</h2>
            <p class="text-indigo-100 text-sm mt-2 opacity-80" data-en="Returns & Gifts Management System" data-ar="نظام إدارة المرتجعات والهدايا">نظام إدارة المرتجعات والهدايا</p>
        </div>
        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 gap-5">
                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2" data-en="Paid Units" data-ar="عدد القطع المدفوعة">عدد القطع المدفوعة</label>
                    <input type="number" id="paidInput" placeholder="أدخل العدد..." data-placeholder-en="Enter quantity..." data-placeholder-ar="أدخل العدد..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2" data-en="Gift Units (Free)" data-ar="عدد الهدايا (مجانية)">عدد الهدايا (مجانية)</label>
                    <input type="number" id="giftInput" placeholder="أدخل العدد..." data-placeholder-en="Enter quantity..." data-placeholder-ar="أدخل العدد..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2" data-en="Returned Quantity" data-ar="كمية المردود (المرتجع)">كمية المردود (المرتجع)</label>
                    <input type="number" id="returnQtyInput" placeholder="أدخل الكمية..." data-placeholder-en="Enter quantity..." data-placeholder-ar="أدخل الكمية..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div class="group">
                    <label class="block text-xs font-bold text-indigo-400 uppercase tracking-wider mb-2" data-en="Product Price (Per Carton)" data-ar="سعر المنتج (للكارتونة)">سعر المنتج (للكارتونة)</label>
                    <input type="number" step="any" id="priceInput" placeholder="أدخل السعر..." data-placeholder-en="Enter price..." data-placeholder-ar="أدخل السعر..." class="w-full bg-slate-900/50 border border-slate-700 rounded-xl p-4 text-white placeholder-slate-500 outline-none focus:ring-2 focus:ring-indigo-500 transition-all font-mono">
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 pt-4">
                <button onclick="calculateReturn()" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/20" data-en="Calculate Now" data-ar="احسب الآن">احسب الآن</button>
                <button onclick="clearReturn()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-4 rounded-xl transition-all" data-en="Clear" data-ar="مسح">مسح</button>
            </div>

            <div class="bg-black/30 rounded-2xl p-6 border border-slate-700/50 space-y-4">
                <h3 class="text-sm font-bold text-slate-400 border-b border-slate-700/50 pb-2 flex items-center gap-2">
                    <span class="w-1.5 h-4 bg-indigo-500 rounded-full"></span> 
                    <span data-en="Detailed Results" data-ar="النتائج التفصيلية">النتائج التفصيلية</span>
                </h3>
                <div class="flex justify-between items-center"><span class="text-slate-400" data-en="Effective Unit Price:" data-ar="سعر المنتج الفعلي:">سعر المنتج الفعلي:</span><span id="piecePriceLbl" class="text-xl font-mono text-white">-</span></div>
                <div class="flex justify-between items-center"><span class="text-slate-400" data-en="Paid Items in Return:" data-ar="القطع المدفوعة في المردود:">القطع المدفوعة في المردود:</span><span id="paidInReturnLbl" class="text-xl font-mono text-emerald-400 font-bold">-</span></div>
                <div class="flex justify-between items-center"><span class="text-slate-400" data-en="Free Items in Return:" data-ar="القطع المجانية في المردود:">القطع المجانية في المردود:</span><span id="freeInReturnLbl" class="text-xl font-mono text-amber-500 font-bold">-</span></div>
                <div class="flex justify-between items-center pt-2 border-t border-slate-700/50"><span class="text-slate-300 font-bold" data-en="Total Return Value:" data-ar="إجمالي المردود:">إجمالي المردود:</span><span id="returnTotalLbl" class="text-xl font-mono text-indigo-400 font-extrabold">-</span></div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="errorModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center p-6 z-50">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl max-w-xs w-full text-center shadow-2xl">
            <div class="text-rose-500 text-5xl mb-4">⚠️</div>
            <h4 class="text-xl font-bold text-white mb-2" data-en="Alert" data-ar="تنبيه">تنبيه</h4>
            <p id="errorText" class="text-slate-400 text-sm mb-8 leading-relaxed"></p>
            <button onclick="hideError()" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-slate-200 transition-colors" data-en="Understand" data-ar="فهمت">فهمت</button>
        </div>
    </div>

    <script>
        let currentLang = 'ar';

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            document.getElementById('header-text').style.textAlign = currentLang === 'ar' ? 'right' : 'left';
            
            document.querySelectorAll('[data-en]').forEach(el => {
                el.innerText = el.getAttribute(`data-${currentLang}`);
            });

            document.querySelectorAll('[data-placeholder-en]').forEach(el => {
                el.placeholder = el.getAttribute(`data-placeholder-${currentLang}`);
            });

            document.getElementById('lang-toggle').innerText = currentLang === 'ar' ? 'English' : 'العربية';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tool-tab').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('active', 'text-white');
                b.classList.add('text-slate-400');
            });
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.add('active', 'text-white');
            activeBtn.classList.remove('text-slate-400');
        }

        function showError(arMsg, enMsg) {
            document.getElementById('errorText').innerText = currentLang === 'ar' ? arMsg : enMsg;
            document.getElementById('errorModal').style.display = 'flex';
        }
        function hideError() {
            document.getElementById('errorModal').style.display = 'none';
        }

        // --- CAKE CALCULATOR LOGIC ---
        const BOXES_PER_PACKAGE = 8;
        const PCS_PER_BOX = 12;
        const TOTAL_PCS_PER_PACKAGE = BOXES_PER_PACKAGE * PCS_PER_BOX; // 96

        function calculateCake() {
            const pkg = parseFloat(document.getElementById('inputPkg').value) || 0;
            const box = parseFloat(document.getElementById('inputBox').value) || 0;
            const pcs = parseFloat(document.getElementById('inputPcs').value) || 0;

            if (pkg < 0 || box < 0 || pcs < 0) {
                showError("يرجى إدخال قيم موجبة.", "Please enter positive values.");
                return;
            }

            // Total pieces calculation
            const totalPcs = (pkg * TOTAL_PCS_PER_PACKAGE) + (box * PCS_PER_BOX) + pcs;
            
            // Decimal calculation
            const totalDecimal = totalPcs / TOTAL_PCS_PER_PACKAGE;

            // Breakdown calculation (Output logic)
            const resPkg = Math.floor(totalPcs / TOTAL_PCS_PER_PACKAGE);
            const remainingPcsAfterPkg = totalPcs % TOTAL_PCS_PER_PACKAGE;
            const resBox = Math.floor(remainingPcsAfterPkg / PCS_PER_BOX);
            const resPcs = remainingPcsAfterPkg % PCS_PER_BOX;

            // Update UI
            document.getElementById('cakeDecimalVal').innerText = Number(totalDecimal.toFixed(4)).toString();
            document.getElementById('cakeTotalPcs').innerText = totalPcs;
            
            const formatStr = currentLang === 'ar' 
                ? `${resPkg} بالة - ${resBox} كرتونة - ${resPcs} قطعة`
                : `${resPkg} Pkg - ${resBox} Box - ${resPcs} Pcs`;
            
            document.getElementById('cakeFormatVal').innerText = formatStr;
        }

        function clearCake() {
            document.getElementById('inputPkg').value = '';
            document.getElementById('inputBox').value = '';
            document.getElementById('inputPcs').value = '';
            document.getElementById('cakeDecimalVal').innerText = '0';
            document.getElementById('cakeTotalPcs').innerText = '0';
            document.getElementById('cakeFormatVal').innerText = '-';
        }

        // --- RETURN CALCULATOR LOGIC ---
        function calculateReturn() {
            const pVal = document.getElementById('paidInput').value;
            const gVal = document.getElementById('giftInput').value;
            const rVal = document.getElementById('returnQtyInput').value;
            const prVal = document.getElementById('priceInput').value;

            if (!pVal || !gVal || !rVal || !prVal) {
                showError("الرجاء إدخال كافة البيانات المطلوبة.", "Please enter all required data.");
                return;
            }

            const paid = parseFloat(pVal);
            const gifts = parseFloat(gVal);
            const returnedQty = parseFloat(rVal);
            const price = parseFloat(prVal);

            if (paid < 0 || gifts < 0 || returnedQty < 0 || price <= 0) {
                showError("تأكد من إدخال قيم موجبة.", "Please ensure positive values.");
                return;
            }

            const totalUnits = paid + gifts;
            if (totalUnits === 0) {
                showError("مجموع القطع لا يمكن أن يكون صفراً.", "Total units cannot be zero.");
                return;
            }

            const piecePrice = (paid * price) / totalUnits;
            const paidInReturnRaw = (piecePrice * returnedQty) / price;
            let paidInReturn = Math.round(paidInReturnRaw);

            if (paidInReturn > returnedQty) paidInReturn = returnedQty;
            if (paidInReturn < 0) paidInReturn = 0;

            const freeInReturn = returnedQty - paidInReturn;

            document.getElementById('piecePriceLbl').innerText = Number(piecePrice.toFixed(4)).toString();
            document.getElementById('paidInReturnLbl').innerText = paidInReturn;
            document.getElementById('freeInReturnLbl').innerText = freeInReturn;
            document.getElementById('returnTotalLbl').innerText = returnedQty;
        }

        function clearReturn() {
            ['paidInput', 'giftInput', 'returnQtyInput', 'priceInput'].forEach(id => {
                document.getElementById(id).value = '';
            });
            document.getElementById('piecePriceLbl').innerText = '-';
            document.getElementById('paidInReturnLbl').innerText = '-';
            document.getElementById('freeInReturnLbl').innerText = '-';
            document.getElementById('returnTotalLbl').innerText = '-';
        }
    </script>
</body>
</html>
